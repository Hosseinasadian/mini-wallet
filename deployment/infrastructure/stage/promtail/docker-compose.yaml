services:
  mini_wallet-promtail:
    image: grafana/promtail:3.0.0
    container_name: mini_wallet-promtail
    profiles:
      - infrastructure
      - stage
    restart: unless-stopped
    networks:
      - docker_wallet-network
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deployment/infrastructure/stage/promtail/config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mini_wallet-loki

networks:
  docker_wallet-network:
    external: true