server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://mini_wallet-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: mini-wallet
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: .*/mini_wallet-.*
        action: keep

      - source_labels: [__meta_docker_container_name]
        regex: .*/mini_wallet-([a-zA-Z0-9_]+)
        target_label: app
        replacement: ${1}

      - target_label: job
        replacement: mini-wallet
    pipeline_stages:
      - json:
          expressions:
            app: app
            layer: layer
            level: level
            request_id: request_id
            error: error
      - labels:
          app: