mysql:
  port: 3306
  database: "wallet_db"

http_port: 5002
http_shut_down_timeout: "3s"
subscriber_shutdown_timeout: "3s"

subscriber:
  retry_ttl: "5s"
  workers: 5
  max_retry: 3
  prefetch_count: 10
  handler_timeout: "10s"

otel:
  service_name: "wallet"
  environment: "stage"
  endpoint: "mini_wallet-otel-collector:4317"
