services:
  auth:
    build:
      context: .
      dockerfile: ./deployment/auth/stage/Dockerfile
    container_name: mini_wallet-auth
    profiles:
      - auth
      - stage
    expose:
      - "5002"
    env_file: ./deployment/auth/stage/.env
    environment:
      ENV: stage
      LOG_LEVEL: debug
      GIN_MODE: release
    networks:
      - docker_wallet-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5002/live" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
networks:
  docker_wallet-network:
    external: true
