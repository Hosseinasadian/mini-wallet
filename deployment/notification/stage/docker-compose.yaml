services:
  notification:
    build:
      context: .
      dockerfile: ./deployment/notification/stage/Dockerfile
    container_name: mini_wallet-notification
    profiles:
      - notification
      - stage
    expose:
      - "5002"
    env_file: ./deployment/notification/stage/.env
    environment:
      ENV: stage
    networks:
      - docker_wallet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  docker_wallet-network:
    external: true
