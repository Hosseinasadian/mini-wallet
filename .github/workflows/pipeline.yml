name: Mini Wallet CI/CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: hossein1992/mini-wallet

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      wallet: ${{ steps.filter.outputs.wallet }}
      docs: ${{ steps.filter.outputs.docs }}
      notification: ${{ steps.filter.outputs.notification }}
      changed_services: ${{ steps.list.outputs.changed_services }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'internal/auth/**'
              - 'deployment/auth/**'
              - 'cmd/auth/**'
              - 'pkg/**'
            wallet:
              - 'internal/wallet/**'
              - 'deployment/wallet/**'
              - 'cmd/wallet/**'
              - 'pkg/**'
            docs:
              - 'internal/docs/**'
              - 'deployment/docs/**'
              - 'cmd/docs/**'
              - 'pkg/**'
            notification:
              - 'internal/notification/**'
              - 'deployment/notification/**'
              - 'cmd/notification/**'
              - 'pkg/**'

      - name: Build changed services list
        id: list
        run: |
          SERVICES=""

          if [ "${{ steps.filter.outputs.auth }}" == "true" ]; then
            SERVICES="$SERVICES auth"
          fi

          if [ "${{ steps.filter.outputs.wallet }}" == "true" ]; then
            SERVICES="$SERVICES wallet"
          fi

          if [ "${{ steps.filter.outputs.docs }}" == "true" ]; then
            SERVICES="$SERVICES docs"
          fi

          if [ "${{ steps.filter.outputs.notification }}" == "true" ]; then
            SERVICES="$SERVICES notification"
          fi

          echo "changed_services=$SERVICES" >> $GITHUB_OUTPUT

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: auth
            changed: ${{ needs.detect-changes.outputs.auth }}
          - service: wallet
            changed: ${{ needs.detect-changes.outputs.wallet }}
          - service: docs
            changed: ${{ needs.detect-changes.outputs.docs }}
          - service: notification
            changed: ${{ needs.detect-changes.outputs.notification }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/${{ matrix.service }}/stage/Dockerfile
          push: true
          tags: |
            hossein1992/mini-wallet-${{ matrix.service }}:latest
            hossein1992/mini-wallet-${{ matrix.service }}:${{ github.sha }}

  deploy-stage:
    needs: [build-and-push, detect-changes]
    runs-on: ubuntu-latest
    if: needs.build-and-push.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure
        run: |
          make start-infrastructure-stage

      - name: Start changed services
        run: |
          SERVICES="${{ needs.detect-changes.outputs.changed_services }}"

          echo "Changed services: $SERVICES"

          if [ -z "$SERVICES" ]; then
            echo "No changed services detected."
            exit 0
          fi
          
          make check-network

          for service in $SERVICES; do
            echo "Starting $service ..."
            make start-$service-stage
          done

      - name: Wait for services
        run: sleep 15

      - name: Show running containers
        run: docker ps

      # =========================
      # Health checks
      # =========================

      - name: Check auth service
        if: contains(needs.detect-changes.outputs.changed_services, 'auth')
        run: |
          curl --fail http://localhost:180/auth/ping

      - name: Check wallet service
        if: contains(needs.detect-changes.outputs.changed_services, 'wallet')
        run: |
          curl --fail http://localhost:180/wallet/ping

      - name: Check docs service
        if: contains(needs.detect-changes.outputs.changed_services, 'docs')
        run: |
          curl --fail http://localhost:180/docs/ping

      - name: Check notification service
        if: contains(needs.detect-changes.outputs.changed_services, 'notification')
        run: |
          curl --fail http://localhost:180/notification/ping

      # =========================
      # Debug logs on failure
      # =========================

      - name: Show logs on failure
        if: failure()
        run: |
          docker ps -a

          docker logs mini_wallet-auth || true
          docker logs mini_wallet-wallet || true
          docker logs mini_wallet-notification || true
          docker logs mini_wallet-docs || true

      # =========================
      # Cleanup
      # =========================

      - name: Stop services
        if: always()
        run: |
          make stop-services-stage
          make stop-infrastructure-stage